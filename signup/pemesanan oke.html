<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafe Kurcaci</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
        <img src="coffee.png" alt="Logo">
        <h1>Kurcaci Kafe</h1>
    </header>
    <main>
        <section class="success-section">
            <h1>Pemesanan Sukses!</h1>
            <p>Terima kasih telah memesan di Coffee Shop kami. Pesanan Anda akan segera kami proses.</p>
            <p>Email: <strong>email@example.com</strong></p>
            <p>Menu: <strong>Kopi Latte</strong></p>
            <p>Jumlah: <strong>2</strong></p>
            <button onclick="location.href='index.html'">Kembali ke Beranda</button>
			<nav>
				<a href="kontak_kami.html">
					
				</a>
			</nav>
        </section>
    </main>

		<style>
			body {
            font-family: Arial, sans-serif;
            background-color: #909090;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            padding: 50px;
            text-align: center;
        }

        header img {
            width: 100px;
            height: 100px;
        }

        main {
            padding: 50px;
        }

        .success-section {
            background-color: white;
            padding: 50px;
            border-radius: 50px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.1);
        }

        .success-section h1 {
            margin-bottom: 30px;
        }

        .success-section p {
            margin-bottom: 20px;
        }

        .success-section button {
            background-color: #333;
            color: white;
            padding: 10px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .success-section button:hover {
            background-color: #555;
        }
		</style>


	</main>
</body>
</html>

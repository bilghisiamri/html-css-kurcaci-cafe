<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafe Kurcaci</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="coffee.png" alt="Logo">
        <h1>Kurcaci Kafe</h1>
    </header>
    <main>
        <section class="contact-section">
            <h1>Kontak Kami</h1>
            <p>Jika Anda memiliki pertanyaan atau ingin menjadi mitra bisnis dengan kami, silakan hubungi kami melalui:</p>
            <p>Email: <strong>email@example.com</strong></p>
            <p>Alamat: <strong>Jl. Coffee No. 1, Jakarta</strong></p>
            <p>Telepon: <strong>+62 812 3456 789</strong></p>
            <button onclick="location.href='home.html'">Kembali ke Beranda</button>
        </section>
    </main>

	<style>
        body {
            font-family: Arial, sans-serif;
            background-color: #909090;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            padding: 50px;
            text-align: center;
        }

        header img {
            width: 100px;
            height: 100px;
        }

        main {
            padding: 50px;
        }

        .contact-section {
            background-color: white;
            padding: 50px;
            border-radius: 50px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.1);
        }

        .contact-section h1 {
            margin-bottom: 30px;
        }

        .contact-section p {
            margin-bottom: 20px;
        }

        .contact-section button {
            background-color: #333;
            color: white;
            padding: 10px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .contact-section button:hover {
            background-color: #555;
        }
    </style>

</body>
</html>
